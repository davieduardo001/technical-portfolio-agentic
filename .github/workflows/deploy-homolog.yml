name: Deploy → homolog

on:
  push:
    branches: [homolog]

env:
  IMAGE: ghcr.io/davieduardo001/technical-portfolio-agentic
  NAMESPACE: homologacao
  DEPLOYMENT: portfolio
  SERVER_USER: root
  SERVER_HOST: 100.110.87.115   # Tailscale IP

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:homolog
            ${{ env.IMAGE }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Deploy to k3s
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          IMAGE_TAG: ${{ env.IMAGE }}:sha-${{ github.sha }}
        run: |
          echo "$SSH_PRIVATE_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

          ssh -o StrictHostKeyChecking=no -i /tmp/deploy_key \
            ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} \
            "k3s kubectl set image deployment/${{ env.DEPLOYMENT }} \
               ${{ env.DEPLOYMENT }}=${IMAGE_TAG} \
               -n ${{ env.NAMESPACE }} && \
             k3s kubectl rollout status deployment/${{ env.DEPLOYMENT }} \
               -n ${{ env.NAMESPACE }} --timeout=120s"

          rm /tmp/deploy_key
