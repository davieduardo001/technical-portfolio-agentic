apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio
  namespace: dev
  labels:
    app: portfolio
    env: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portfolio
  template:
    metadata:
      labels:
        app: portfolio
        env: dev
    spec:
      containers:
      - name: portfolio
        image: ghcr.io/davieduardo001/technical-portfolio-agentic:dev
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          value: production
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: portfolio
  namespace: dev
spec:
  selector:
    app: portfolio
  ports:
  - port: 80
    targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: portfolio
  namespace: dev
spec:
  ingressClassName: traefik
  rules:
  - host: portfolio.192.168.0.213.nip.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: portfolio
            port:
              number: 80
